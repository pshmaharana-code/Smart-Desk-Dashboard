<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Desk Dashboard V5.1 (Divided Sleep Mode)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #000; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh; width: 100vw; overflow: hidden;
            display: grid; grid-template-columns: 1fr 1fr 1fr;
        }

        /* --- THE DIVIDED SLEEP MODE OVERLAY --- */
        #offline-screen {
            display: none; /* JavaScript will change this to 'grid' when offline */
            position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            background: #000; 
            z-index: 9999; 
            grid-template-columns: 1fr 1fr 1fr;
        }

        .sleep-panel {
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            height: 100%;
        }

        .panel {
            border-right: 2px solid #333; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative; min-width: 0;
        }
        .panel:last-child { border-right: none; }

        /* --- DYNAMIC APP CONTAINERS --- */
        .app-module { 
            width: 100%; height: 100%; 
            display: flex; flex-direction: column; position: relative; 
        }

        /* App 1: Pet */
        .app-pet { background-color: #000; overflow: hidden; }
        .app-pet img { width: 100%; height: 100%; object-fit: cover; image-rendering: pixelated; }
        
        /* App 2: Weather */
        .app-weather {
            padding: 10px; text-align: center; background-color: #111; 
            background-size: cover; background-position: center; font-family: 'Roboto', sans-serif;
            transition: background-image 1s ease-in-out; 
        }
        
        /* App 3: Spotify */
        .app-spotify { 
            background-color: #121212; font-family: 'Roboto', sans-serif; overflow: hidden; 
        }
        
        
        
        #fallback-view { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; width: 100%; height: 100%; transition: opacity 0.5s; }
        #clock { font-size: 1.5rem; color: #fff; font-weight: 500; letter-spacing: 1px; }
        #weather-container { display: flex; flex-direction: column; align-items: center; }
        #temp-wrapper { position: relative; display: inline-block; margin-bottom: 5px; }
        #temp-value { font-size: 6.5rem; font-weight: 700; color: #fff; line-height: 1; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        #temp-unit { font-size: 2rem; font-weight: 500; position: absolute; top: 10px; right: -30px; color: #fff; }
        #condition { font-size: 1.4rem; color: #fff; font-weight: 500; margin-bottom: 8px; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }
        #extra-weather { font-size: 1.1rem; color: #fff; opacity: 0.9; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }

        /* GPU Lyrics View */
        #lyrics-view {
            display: none; 
            width: 100%; height: 100%;
            overflow: hidden; 
            position: absolute; top: 0; left: 0;
            z-index: 5;
        }

        #lyrics-track {
            position: absolute;
            width: 100%;
            top: 50%; 
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform;
            padding: 0 20px;
        }

        .lyric-line {
            font-size: 1.2rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.3); 
            margin: 18px 0; 
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            transform-origin: center;
            text-align: center;
        }

        .lyric-line.active {
            font-size: 1.7rem; 
            color: #fff; 
            text-shadow: 0px 4px 15px rgba(0,0,0,0.9);
            transform: scale(1.1); 
        }

        #spotify-empty { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; }
        #spotify-empty svg { width: 70px; height: 70px; fill: #1db954; margin-bottom: 15px; }
        #spotify-empty-text { font-size: 1.2rem; font-weight: bold; color: #fff; }
        #spotify-active { display: none; width: 100%; height: 100%; position: relative; z-index: 2; flex-direction: column; justify-content: space-evenly; padding: 12px; }
        #album-cover { width: 75%; margin: 0 auto; aspect-ratio: 1; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); object-fit: cover; }
        #song-info { width: 100%; text-align: left; }
        #song-title { font-size: 1.3rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #song-artist { font-size: 1rem; color: #b3b3b3; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #progress-area { width: 100%; }
        #progress-container { width: 100%; height: 4px; background-color: rgba(255, 255, 255, 0.2); border-radius: 2px; margin-bottom: 6px; position: relative; }
        #progress-bar { height: 100%; width: 0%; background-color: #fff; border-radius: 2px; position: relative; }
        #progress-dot { width: 10px; height: 10px; background-color: #fff; border-radius: 50%; position: absolute; right: -5px; top: -3px; }
        #time-info { display: flex; justify-content: space-between; font-size: 0.75rem; color: #b3b3b3; font-weight: 500; }
        #controls-area { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 0 8px; }
        .icon-btn { fill: #fff; opacity: 0.9; width: 16px; height: 16px; } 
        .icon-btn.secondary { fill: #1db954; width: 14px; height: 14px; } 
        #play-pause-btn { width: 38px; height: 38px; background-color: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #play-pause-btn svg { fill: #000; width: 16px; height: 16px; } 

        /* App 4: Quotes */
        .app-quotes {
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; text-align: center;
            height: 100%; width: 100%;
            overflow: hidden; 
            box-sizing: border-box;
        }
        
        #quote-text {
            /* === INTER FONT FOR MAX VISIBILITY === */
            font-family: 'Inter', sans-serif;
            font-weight: 800; 
            color: #fff; 
            line-height: 1.3;
            font-size: clamp(1.2rem, 2.5vw, 2.2rem); 
            
            opacity: 0; 
            transition: opacity 2s ease-in-out; 
            text-shadow: 0px 5px 25px rgba(255,255,255,0.4);
            
            /* Required so the red quote mark attaches to the text correctly */
            position: relative;
        }
        
        /* The red "Suits" style quote mark */
        #quote-text::before {
            content: "\201C";
            color: #d11124; /* Deep cinematic red */
            font-size: 1.5em;
            position: absolute;
            left: -20px;
            top: -15px;
            font-style: normal;
        }

        /* App 5: Live News */
        .app-news {
            background-color: #050505; 
            padding: 25px 20px;
            display: flex; flex-direction: column; 
            height: 100%; width: 100%; box-sizing: border-box;
            border-top: 4px solid #d11124; 
            
            /* FIX 1: Prevent Grid Blowout */
            overflow: hidden; 
            
            /* NEW: Dynamic Background Setup */
            background-size: cover;
            background-position: center;
            transition: background-image 1s ease-in-out;
            position: relative;
        }

        /* NEW: Dark overlay so white text is always readable over ANY image */
        .app-news::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.95));
            z-index: 1;
        }
        
        .news-header {
            color: #d11124; font-family: 'Inter', sans-serif;
            font-size: 0.9rem; font-weight: 800; letter-spacing: 2px; 
            margin-bottom: 15px; text-transform: uppercase;
            position: relative; z-index: 2; /* Keeps text above the dark overlay */
        }
        
        #news-content {
            font-family: 'Inter', sans-serif; 
            /* FIX 1: Auto-shrinking font for long titles */
            font-size: clamp(1.1rem, 2vw, 1.4rem); 
            font-weight: 600;
            color: #fff; line-height: 1.4; flex-grow: 1;
            display: flex; align-items: center; text-align: left;
            position: relative; z-index: 2; /* Keeps text above the dark overlay */
            
            opacity: 0; 
            transform: translateY(15px);
            transition: all 1s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        #news-source {
            font-size: 0.85rem; color: #aaa; margin-top: 12px; font-weight: 400; text-transform: uppercase; letter-spacing: 1px;
            display: block;
        }

        /* --- LIVE NOTIFICATION OVERLAY --- */
        #notification-toast {
            position: fixed;
            top: -150px; 
            left: 50%;
            transform: translateX(-50%);
            
            /* Compact sizing */
            width: auto; 
            min-width: 250px;
            max-width: 85%;
            
            /* Premium Creamy White */
            background: #FAF9F6; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Softer shadow for a light UI */
            
            /* Sharp, professional structure with a subtle boundary */
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.08); 
            border-left: 4px solid #1db954; /* Clean Spotify-green accent */
            padding: 12px 16px; 
            
            z-index: 10000; 
            font-family: 'Inter', sans-serif;
            transition: top 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        #notification-toast.show {
            top: 15px; 
        }

        /* Tiny, subtle dark grey app name */
        #notif-app { 
            font-size: 0.65rem; 
            color: #666666; 
            font-weight: 700; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            margin-bottom: 2px; 
        }
        
        /* Bold, high-contrast almost-black sender name */
        #notif-title { 
            font-size: 0.95rem; 
            color: #111111; 
            font-weight: 800; 
            margin-bottom: 2px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        
        /* Clean, professional dark-grey message preview */
        #notif-body { 
            font-size: 0.85rem; 
            color: #444444; 
            font-weight: 500; 
            line-height: 1.3; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            line-clamp: 2; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
        }

    </style>
</head>
<body>

            <div style="font-size: 2.5rem; color: #555;">Z<span style="font-size:1.5rem">z</span></div>

            <div style="font-size: 3.5rem; margin-bottom: 10px; color: #FFD700;">🌙</div> <h2 style="font-family: 'Roboto', sans-serif; font-weight: 400; font-size: 1.1rem; color: #FFF; line-height: 1.3;">SYSTEM<br>SLEEPING</h2>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.1/socket.io.min.js"></script>

    <script>
        // --- WEBSOCKET RECEIVER ---
        const socket = io();  // Automatically connects to the IP that served the page

        socket.on('connect', function() {
            console.log('🟢 Walkie-Talkie Connected!');
        });

        socket.on('server_update', function(data) {
            console.log('📩 Message from Command Center:', data.message);
            // In Phase B, we will use this space to instantly change the screen!
        });

        socket.on('force_layout_change', function(data) {
            console.log(`🤖 REMOTE COMMAND: Moving ${data.app} to Slot ${data.slot}`);

            // Instantly run the injection engine!
            mountApp(data.app, data.slot);
        });
        
        socket.on('refresh_pet', function() {
            console.log('🔄 Refreshing Pet GIF...');
            const petImg = document.querySelector('.app-pet img');
            if(petImg) {
                // The ?t= forces the browser to pull the new image instead of using old memory
                petImg.src = 'pet.gif?t=' + new Date().getTime();
            }
        });

        // NEW: Listen for a new Quote upload
        socket.on('refresh_quotes', function() {
            console.log('🔄 Refreshing Quotes list...');
            fetchQuotes(); // Re-download the updated JSON file!
        });

        // NEW: The Kill Switch Listener
        socket.on('force_reload', function() {
            console.log('⚠️ Reboot command received. Reloading system...');
            
            // This is the JavaScript command that forces a hard browser refresh
            window.location.reload(true); 
        });

        function mountApp(appName, slotNumber) {
            const slot = document.getElementById(`slot-${slotNumber}`);
            const appModule = document.getElementById(`module-${appName}`);
            const vault = document.getElementById('app-vault');

            if(slot && appModule) {
                // 1. If there is already an app in this slot, send it back to the vault!
                if (slot.children.length > 0) {
                    vault.appendChild(slot.children[0]); 
                }
                // 2. Now move the requested app into the slot
                slot.appendChild(appModule); 
            }
        }

        // Initialize our default layout on boot!
        mountApp('pet', 1);
        mountApp('weather', 2);
        mountApp('spotify', 3);



        let syncedProgressMs = 0;
        let lastSyncTimestamp = 0;
        let localDurationMs = 0;
        let isPlayingLocal = false;
        let isOffline = false; 
        
        let currentTrackName = "";
        let weatherBgImage = "clear.jpg"; 
        let currentLyrics = []; 
        let currentLyricIndex = -1; 

        // --- CLOCK & WEATHER ---
        function updateClock() { const now = new Date(); let h = now.getHours(); let m = now.getMinutes(); let s = now.getSeconds(); document.getElementById('clock').innerText = `${h<10?'0'+h:h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`; }
        updateClock(); setInterval(updateClock, 1000);

        async function fetchWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=19.3150&longitude=84.7941&current=temperature_2m,apparent_temperature,weather_code,is_day&daily=temperature_2m_max,temperature_2m_min&timezone=auto`); const data = await res.json();
                let isDay = data.current.is_day; 
                weatherBgImage = isDay ? "clear.jpg" : "night.jpg"; 
                let code = data.current.weather_code;
                let c = "Clear"; let i = isDay ? "☀️" : "🌙"; 
                if (code >= 1 && code <= 3) { c = "Intermittent clouds"; i = isDay ? "⛅" : "☁️"; weatherBgImage = isDay ? "intermittent.jpg" : "night.jpg"; }
                else if(code>=45&&code<=48){c="Fog";i="🌫️";weatherBgImage="fog.jpg";}
                else if(code>=51&&code<=67){c="Rain";i="🌧️";weatherBgImage="rain.jpg";}
                else if(code>=71&&code<=77){c="Snow";i="❄️";weatherBgImage="snow.jpg";}
                else if(code>=95){c="Thunderstorm";i="⛈️";weatherBgImage="storm.jpg";}
                document.getElementById('temp-value').innerText = Math.round(data.current.temperature_2m); document.getElementById('condition').innerText = `${i} ${c}`;
                document.getElementById('extra-weather').innerHTML = `${Math.round(data.daily.temperature_2m_min[0])} ~ ${Math.round(data.daily.temperature_2m_max[0])}&deg;C &nbsp;&nbsp;Feels like ${Math.round(data.current.apparent_temperature)}&deg;C`;
                if (!isPlayingLocal || currentLyrics.length === 0) { document.querySelector('.dynamic-bg-target').style.backgroundImage = `url('${weatherBgImage}')`; }
            } catch(e) {}
        }
        fetchWeather(); setInterval(fetchWeather, 900000); 

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000); const minutes = Math.floor(totalSeconds / 60); const seconds = totalSeconds % 60;
            return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        // --- LYRICS ---
        async function fetchLyrics(track, artist) {
            try {
                const url = `https://lrclib.net/api/get?track_name=${encodeURIComponent(track)}&artist_name=${encodeURIComponent(artist)}`;
                const res = await fetch(url);
                if (res.ok) { const data = await res.json(); if (data.syncedLyrics) return parseLRC(data.syncedLyrics); }
            } catch(e) {}
            return null; 
        }
        function parseLRC(lrcText) {
            const lines = lrcText.split('\n'); const lyrics = []; const regex = /\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/;
            for (let line of lines) { const match = regex.exec(line); if (match) { const m = parseInt(match[1], 10); const s = parseInt(match[2], 10); const ms = parseInt(match[3].padEnd(3, '0'), 10); lyrics.push({ time: (m * 60000) + (s * 1000) + ms, text: match[4].trim() || "♪" }); } }
            return lyrics;
        }
        function buildLyricsUI(lyricsArray) {
            const track = document.getElementById('lyrics-track'); track.innerHTML = ""; track.style.transform = `translateY(0px)`;
            lyricsArray.forEach((line, index) => { const div = document.createElement('div'); div.className = 'lyric-line'; div.id = `lyric-${index}`; div.innerText = line.text; track.appendChild(div); });
            currentLyricIndex = -1; 
        }

        // --- ANIMATION LOOP ---
        setInterval(() => {
            if (isPlayingLocal && localDurationMs > 0) {
                let localProgressMs = syncedProgressMs + (Date.now() - lastSyncTimestamp);
                if (localProgressMs > localDurationMs) localProgressMs = localDurationMs; 
                document.getElementById('current-time').innerText = formatTime(localProgressMs);
                document.getElementById('progress-bar').style.width = `${(localProgressMs / localDurationMs) * 100}%`;
                if (currentLyrics.length > 0) {
                    let activeIndex = -1;
                    for (let i = 0; i < currentLyrics.length; i++) { if (localProgressMs >= currentLyrics[i].time) { activeIndex = i; } else { break; } }
                    if (activeIndex !== -1 && activeIndex !== currentLyricIndex) {
                        currentLyricIndex = activeIndex; 
                        document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
                        const activeEl = document.getElementById(`lyric-${activeIndex}`);
                        if (activeEl) { activeEl.classList.add('active'); const offset = -(activeEl.offsetTop + (activeEl.clientHeight / 2)); document.getElementById('lyrics-track').style.transform = `translateY(${offset}px)`; }
                    }
                }
            }
        }, 50); 

        // --- SPOTIFY SYNC + HEARTBEAT ---
        async function fetchSpotify() {
            try {
                // THE CACHE BUSTER: '?t=' + timestamp forces the J2 to check the network fresh every time!
                const response = await fetch('/now_playing?t=' + new Date().getTime());
                
                if (!response.ok) throw new Error("Server not ready");

                // WAKE UP SMOOTHLY
                if (isOffline) { 
                    isOffline = false; 
                    document.getElementById('offline-screen').style.display = 'none'; 
                }
                
                const data = await response.json();
                const activeUI = document.getElementById('spotify-active');
                const emptyUI = document.getElementById('spotify-empty');
                const spotifyBg = document.getElementById('spotify-bg');
                const middleBg = document.querySelector('.dynamic-bg-target');
                const fallbackView = document.getElementById('fallback-view');
                const lyricsView = document.getElementById('lyrics-view');

                if (data.is_playing) {
                    if (currentTrackName !== data.song) {
                        currentTrackName = data.song;
                        document.getElementById('album-cover').src = data.album_art;
                        spotifyBg.style.backgroundImage = `url('${data.album_art}')`; 
                        document.getElementById('song-title').innerText = data.song;
                        document.getElementById('song-artist').innerText = data.artist;
                        currentLyrics = []; 
                        const newLyrics = await fetchLyrics(data.song, data.artist);
                        if (newLyrics && newLyrics.length > 0) {
                            currentLyrics = newLyrics; buildLyricsUI(currentLyrics); fallbackView.style.display = 'none'; lyricsView.style.display = 'flex';
                            middleBg.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('${data.album_art}')`;
                        } else { fallbackView.style.display = 'flex'; lyricsView.style.display = 'none'; middleBg.style.backgroundImage = `url('${weatherBgImage}')`; }
                    }
                    syncedProgressMs = data.progress_ms; localDurationMs = data.duration_ms; lastSyncTimestamp = Date.now(); isPlayingLocal = true;
                    document.getElementById('total-time').innerText = formatTime(localDurationMs);
                    activeUI.style.display = 'flex'; emptyUI.style.display = 'none'; spotifyBg.style.display = 'block';
                } else {
                    isPlayingLocal = false; currentTrackName = ""; currentLyricIndex = -1;
                    activeUI.style.display = 'none'; emptyUI.style.display = 'flex'; spotifyBg.style.display = 'none';
                    fallbackView.style.display = 'flex'; lyricsView.style.display = 'none'; middleBg.style.backgroundImage = `url('${weatherBgImage}')`;
                }
            } catch (error) {
                // SERVER IS OFFLINE
                isOffline = true;
                document.getElementById('offline-screen').style.display = 'grid'; 
            }
        }
        
        // --- QUOTES ENGINE ---
        let quotesArray = ["Stand by..."];
        let shuffleBag = []; // The deck of cards
        let currentQuoteIndex = -1;
        
        async function fetchQuotes() {
            try {
                const res = await fetch('/quotes.json?t=' + new Date().getTime());
                if(res.ok) { 
                    quotesArray = await res.json(); 
                }
            } catch(e) { console.log("Quotes file not found."); }
        }

        // The Fisher-Yates Shuffle Algorithm
        // Instead of picking randomly, this engine takes all 20 quotes,
        // shuffles them like a deck of cards, and deals them out one by one. 
        // Once the deck is empty, it reshuffles. Zero repeats until every quote has played.
        function fillAndShuffleBag() {
            shuffleBag = quotesArray.map((_, index) => index); // Create an array of numbers [0, 1, 2... 19]
            for (let i = shuffleBag.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffleBag[i], shuffleBag[j]] = [shuffleBag[j], shuffleBag[i]]; // Swap
            }
            
            // Safety check: Make sure the first card of the NEW deck isn't the same as the last card of the OLD deck
            if (shuffleBag.length > 1 && shuffleBag[0] === currentQuoteIndex) {
                shuffleBag.push(shuffleBag.shift()); // Move it to the back of the line
            }
        }
        
        function cycleQuotes() {
            const quoteEl = document.getElementById('quote-text');
            if(!quoteEl) return;
            
            quoteEl.style.opacity = 0; // Fade out
            
            setTimeout(() => {
                if(quotesArray.length > 0) {
                    // If the deck is empty, shuffle a new one!
                    if (shuffleBag.length === 0) {
                        fillAndShuffleBag();
                    }
                    
                    // Draw the top card from the deck
                    currentQuoteIndex = shuffleBag.pop();
                    
                    // Update the text
                    quoteEl.innerText = quotesArray[currentQuoteIndex];
                }
                quoteEl.style.opacity = 1; // Fade in
            }, 2000); 
        }
        
        // Start the engine
        fetchQuotes().then(() => {
            cycleQuotes();
            setInterval(cycleQuotes, 12000); 
        });


        // --- LIVE NEWS ENGINE ---
        let newsArticles = [];
        let currentNewsIndex = 0;

        async function fetchNews() {
            try {
                const res = await fetch('https://saurav.tech/NewsAPI/top-headlines/category/general/in.json');
                const data = await res.json();
                if (data.articles && data.articles.length > 0) {
                    let newDeck = data.articles;
                    
                    // --- THE NEWS SHUFFLER ---
                    // Shuffle the articles like a deck of cards before showing them
                    for (let i = newDeck.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
                    }
                    
                    newsArticles = newDeck;
                    currentNewsIndex = 0; // Start at the top of the newly shuffled deck
                }
            } catch(e) { console.log("News feed offline."); }
        }

        function cycleNews() {
            const newsEl = document.getElementById('news-content');
            const newsModule = document.getElementById('module-news'); // Grab the whole container
            if(!newsEl || newsArticles.length === 0) return;

            // 1. Slide and fade out
            newsEl.style.opacity = 0;
            newsEl.style.transform = "translateY(-15px)";

            setTimeout(() => {
                // 2. Change the text and background while it's invisible
                const article = newsArticles[currentNewsIndex];
                
                // --- NEW: DYNAMIC BACKGROUND INJECTION ---
                if (article.urlToImage) {
                    newsModule.style.backgroundImage = `url('${article.urlToImage}')`;
                } else {
                    newsModule.style.backgroundImage = 'none'; // Fallback to black if no image
                }

                // Inject the text
                newsEl.innerHTML = `<div style="width: 100%;">
                    <div>${article.title}</div>
                    <div id="news-source">— ${article.source.name}</div>
                </div>`;

                // 3. Reset position to the bottom for the slide-in effect
                newsEl.style.transition = "none"; 
                newsEl.style.transform = "translateY(15px)";

                // 4. Slide and fade in
                setTimeout(() => {
                    newsEl.style.transition = "all 1s cubic-bezier(0.25, 1, 0.5, 1)";
                    newsEl.style.opacity = 1;
                    newsEl.style.transform = "translateY(0px)";
                }, 50); 

                currentNewsIndex = (currentNewsIndex + 1) % newsArticles.length;
            }, 1000); 
        }

        // Boot up the News Engine!
        fetchNews().then(() => {
            cycleNews();
            setInterval(cycleNews, 12000); // Show each headline for 12 seconds
            setInterval(fetchNews, 3600000); // Fetch fresh news from the internet every 1 hour
        });

        // --- LIVE PUSHBULLET NOTIFICATIONS (SECURE) ---
        fetch('/api/get_keys')
            .then(res => res.json())
            .then(data => {
                const PUSHBULLET_TOKEN = data.pb_token;
                
                if (PUSHBULLET_TOKEN) {
                    const pbSocket = new WebSocket('wss://stream.pushbullet.com/websocket/' + PUSHBULLET_TOKEN);
                    
                    pbSocket.onopen = function() { console.log("🟢 Pushbullet Telemetry Online!"); };
                    
                    pbSocket.onmessage = function(event) {
                        const packet = JSON.parse(event.data);
                        
                        if (packet.type === 'push' && packet.push && packet.push.type === 'mirror') {
                            showNotification(packet.push.application_name, packet.push.title, packet.push.body);
                        } else if (packet.type === 'push' && packet.push && packet.push.type === 'sms_changed') {
                            if (packet.push.notifications && packet.push.notifications.length > 0) {
                                const sms = packet.push.notifications[0];
                                showNotification("SMS MESSAGE", sms.title, sms.body);
                            }
                        }
                    };
                }
            });

        let notifTimeout;
        function showNotification(appName, title, body) {
            const toast = document.getElementById('notification-toast');
            if (!title || !body) return;

            document.getElementById('notif-app').innerText = appName || "NEW MESSAGE";
            document.getElementById('notif-title').innerText = title;
            document.getElementById('notif-body').innerText = body;

            toast.classList.add('show');
            clearTimeout(notifTimeout);
            notifTimeout = setTimeout(() => { toast.classList.remove('show'); }, 6000);
        }

        fetchSpotify(); 
        setInterval(fetchSpotify, 3500); 
    </script>
